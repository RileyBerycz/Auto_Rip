services:
  backend:
    image: ghcr.io/rileyberycz/dvdflix-backend:latest
    pull_policy: always
    command: ["python", "-m", "backend.run"]
    privileged: true
    device_cgroup_rules:
      - "b 11:* rmw"
      - "c 21:* rmw"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLASK_ENV=production
    ports:
      - "7272:7272"
    volumes:
      - dvdflix-data:/app/data
      - dvdflix-movies:/media/movies
      - dvdflix-tvshows:/media/tvshows
      - dvdflix-temp:/media/tmp
      - /dev:/dev
      - /run/udev:/run/udev:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:7272/api/setup/status', timeout=5)"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  frontend:
    image: ghcr.io/rileyberycz/dvdflix-frontend:latest
    pull_policy: always
    stdin_open: true
    tty: true
    ports:
      - "7273:7273"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:7273').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  dvdflix-data:
  dvdflix-movies:
  dvdflix-tvshows:
  dvdflix-temp:
