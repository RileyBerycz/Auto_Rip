services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-backend}:${IMAGE_TAG:-latest}
    container_name: dvdflix-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MOVIES_PATH
      - TV_PATH
      - TEMP_RIP_PATH
      - DRIVES
      - TMDB_API_KEY
      - OLLAMA_URL
      - OLLAMA_MODEL
      - RUNTIME_TOLERANCE_MINUTES
      - MAX_IDENTIFY_WORKERS
      - DISC_CACHE_DB
      - HSA_OVERRIDE_GFX_VERSION
      - FLASK_ENV
    ports:
      - "${BACKEND_PORT:-7272}:7272"
    volumes:
      - dvdflix-data:/app/data
      - dvdflix-movies:/media/movies
      - dvdflix-tvshows:/media/tvshows
      - dvdflix-temp:/media/tmp
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-frontend}:${IMAGE_TAG:-latest}
    container_name: dvdflix-frontend
    environment:
      - VITE_API_URL
      - VITE_SOCKET_URL
    ports:
      - "${FRONTEND_PORT:-7273}:7273"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: dvdflix-ollama
    profiles: ["bundled-ollama"]
    environment:
      - HSA_OVERRIDE_GFX_VERSION
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  dvdflix-data:
  dvdflix-movies:
  dvdflix-tvshows:
  dvdflix-temp:
  ollama:
