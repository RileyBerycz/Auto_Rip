services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-backend}:${IMAGE_TAG:-latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MOVIES_PATH
      - TV_PATH
      - TEMP_RIP_PATH
      - DRIVES
      - TMDB_API_KEY
      - OLLAMA_URL
      - OLLAMA_MODEL
      - RUNTIME_TOLERANCE_MINUTES
      - MAX_IDENTIFY_WORKERS
      - DISC_CACHE_DB
      - HSA_OVERRIDE_GFX_VERSION
      - FLASK_ENV
    ports:
      - "${BACKEND_PORT:-7272}:7272"
    volumes:
      - dvdflix-data:/app/data
      - dvdflix-movies:/media/movies
      - dvdflix-tvshows:/media/tvshows
      - dvdflix-temp:/media/tmp
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:7272/api/setup/status', timeout=5)"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-frontend}:${IMAGE_TAG:-latest}
    environment:
      - VITE_API_URL
      - VITE_SOCKET_URL
    ports:
      - "${FRONTEND_PORT:-7273}:7273"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:7273').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["bundled-ollama"]
    environment:
      - HSA_OVERRIDE_GFX_VERSION
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  dvdflix-data:
  dvdflix-movies:
  dvdflix-tvshows:
  dvdflix-temp:
  ollama:
