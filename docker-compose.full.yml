services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-backend}:${IMAGE_TAG:-latest}
    pull_policy: always
    command: ["python", "-m", "backend.run"]
    privileged: ${BACKEND_PRIVILEGED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    devices:
      - ${DRIVE_0:-/dev/sr0}:${DRIVE_0:-/dev/sr0}
      - ${DRIVE_1:-/dev/sr1}:${DRIVE_1:-/dev/sr1}
      - ${DRIVE_2:-/dev/sr2}:${DRIVE_2:-/dev/sr2}
    environment:
      - MOVIES_PATH
      - TV_PATH
      - TEMP_RIP_PATH
      - DRIVES
      - TMDB_API_KEY
      - OMDB_API_KEY
      - TVDB_API_KEY
      - TVDB_PIN
      - OLLAMA_URL
      - OLLAMA_MODEL
      - RUNTIME_TOLERANCE_MINUTES
      - IDENTIFY_MIN_CONFIDENCE
      - MAX_IDENTIFY_WORKERS
      - DISC_CACHE_DB
      - OPENSUBTITLES_API_KEY
      - ENABLE_WEB_SEARCH
      - SEARXNG_URL
      - HANDBRAKE_PRESET
      - HSA_OVERRIDE_GFX_VERSION
      - FLASK_ENV
    ports:
      - "${BACKEND_PORT:-7272}:7272"
    volumes:
      - ${HOST_DATA_PATH:-./data}:/app/data
      - ${HOST_MOVIES_PATH}:${MOVIES_PATH:-/media/movies}
      - ${HOST_TV_PATH}:${TV_PATH:-/media/tvshows}
      - ${HOST_TEMP_RIP_PATH}:${TEMP_RIP_PATH:-/media/tmp}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:7272/api/setup/status', timeout=5)"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rileyberycz/dvdflix-frontend}:${IMAGE_TAG:-latest}
    pull_policy: always
    stdin_open: true
    tty: true
    environment:
      - VITE_API_URL
      - VITE_SOCKET_URL
    ports:
      - "${FRONTEND_PORT:-7273}:7273"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:7273').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Searxng for superior metasearch during escalation
  searxng:
    image: searxng/searxng:latest
    profiles: ["bundled-searxng"]
    stdin_open: true
    tty: true
    ports:
      - "8888:8888"
    volumes:
      - searxng:/etc/searxng
    environment:
      - SEARXNG_AUTOCOMPLETE=""
      - SEARXNG_IMAGE_PROXY=false
    restart: unless-stopped

  # Optional bundled Ollama for all-in-one hosts.
  ollama:
    image: ollama/ollama:latest
    profiles: ["bundled-ollama"]
    environment:
      - HSA_OVERRIDE_GFX_VERSION
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama:
  searxng:
